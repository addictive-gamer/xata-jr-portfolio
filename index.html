<div id="image-viewer">
        <span class="close-viewer">&times;</span>
        <div class="viewer-content">
            <div class="img-protector" oncontextmenu="return false;"></div>
            <img id="full-image" src="" alt="Full Resolution" oncontextmenu="return false;">
        </div>
    </div>

    <script>
        // Lógica del Visor de Imágenes
        const viewer = document.getElementById('image-viewer');
        const fullImg = document.getElementById('full-image');
        const closeBtn = document.querySelector('.close-viewer');

        // Abrir al hacer clic en cualquier item de la galería
        document.querySelectorAll('.example-item img').forEach(img => {
            img.onclick = () => {
                viewer.style.display = 'flex';
                fullImg.src = img.src;
                document.body.style.overflow = 'hidden'; // Bloquea scroll
            };
        });

        // Cerrar visor
        closeBtn.onclick = () => {
            viewer.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        // Cerrar si haces clic fuera de la imagen
        viewer.onclick = (e) => {
            if(e.target === viewer) {
                viewer.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        // Bloquear clic derecho en todo el visor
        viewer.oncontextmenu = (e) => e.preventDefault();
        
        // --- (Aquí sigue tu función setAge y demás scripts anteriores) ---
        function setAge() {
            const birth = new Date('2010-10-10');
            const now = new Date();
            let age = now.getFullYear() - birth.getFullYear();
            if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
            document.getElementById('age-num').innerText = age;
        }
        // ... (resto de tus funciones selectLang, etc.)
    </script>
