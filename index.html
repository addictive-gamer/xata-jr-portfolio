<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Xata Jr. | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #08080a;
            --glass: rgba(22, 22, 31, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.5);
            --text-main: #f0f0f0;
            --text-secondary: #9494a5;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e0d36, var(--bg) 70%);
            background-color: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; min-height: 100vh;
        }

        /* SISTEMA BILINGÜE */
        [data-lang="es"] .en, [data-lang="en"] .es { display: none !important; }

        /* POPUP INICIAL */
        #lang-popup {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(8,8,10,0.98); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }
        .popup-content { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--accent); text-align: center; box-shadow: 0 0 30px var(--accent-glow); }
        .popup-btn { padding: 12px 25px; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: white; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; }
        .popup-btn:hover { background: var(--accent); transform: scale(1.1); }

        #lang-toggle {
            position: fixed; top: 15px; right: 15px; display: none;
            background: var(--glass); border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; z-index: 1000;
        }

        header { width: 90%; max-width: 1000px; padding: 100px 0 50px; text-align: center; }
        h1 { font-size: clamp(3rem, 10vw, 5rem); margin: 0; font-weight: 900; letter-spacing: -3px; }
        h1 span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        
        .container { width: 90%; max-width: 1000px; margin-bottom: 100px; }

        /* REDES SOCIALES */
        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 30px 0; }
        .social-link { padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: white; text-decoration: none; border-radius: 15px; text-align: center; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .social-link:hover { background: var(--accent); transform: translateY(-3px); }

        /* GALERÍA */
        .examples-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .example-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; height: 280px; overflow: hidden; transition: 0.4s; }
        .example-item:hover { border-color: var(--accent); transform: translateY(-5px); }
        .example-img { width: 100%; height: 100%; cursor: pointer; }
        .example-img img { width: 100%; height: 100%; object-fit: cover; }

        /* VISOR DE IMAGEN (LIGHTBOX) v5.8 */
        #image-viewer {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            justify-content: center; align-items: center; cursor: default !important;
        }
        .viewer-content { position: relative; display: flex; justify-content: center; align-items: center; }
        #full-image { max-width: 90vw; max-height: 85vh; border-radius: 10px; pointer-events: none; }
        .img-protector { position: absolute; inset: 0; z-index: 10002; cursor: pointer !important; }
        
        /* MOTOR DE LUPA */
        #zoom-lens {
            position: fixed; width: 180px; height: 180px; border-radius: 15px;
            border: 2px solid var(--accent); overflow: hidden; pointer-events: none;
            display: none; transform: translate(-50%, -50%); z-index: 10003;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        #zoomed-image { position: absolute; width: 200%; height: auto; display: block; }

        .close-viewer { position: absolute; top: 20px; right: 30px; color: white; font-size: 45px; cursor: pointer; z-index: 10004; }

        h2 { font-size: 0.8rem; letter-spacing: 4px; color: var(--accent); margin: 80px 0 20px; display: flex; align-items: center; text-transform: uppercase; }
        h2::after { content: ""; height: 1px; flex-grow: 1; background: var(--glass-border); margin-left: 20px; }

        footer { padding: 60px; text-align: center; opacity: 0.5; font-size: 0.85rem; }
    </style>
</head>
<body data-lang="es">

    <div id="lang-popup">
        <div class="popup-content">
            <h3 class="es">Elige tu idioma</h3><h3 class="en">Choose language</h3>
            <div class="popup-btns">
                <button class="popup-btn" onclick="selectLang('es')">ESPAÑOL</button>
                <button class="popup-btn" onclick="selectLang('en')">ENGLISH</button>
            </div>
        </div>
    </div>

    <button id="lang-toggle" onclick="toggleLanguage()"></button>

    <header>
        <h1><span>Xata</span> Jr.</h1>
        <p><span id="age-num"></span> <span class="es">años</span><span class="en">years old</span> • @Addictiive</p>
    </header>

    <div class="container">
        <div class="social-grid">
            <a href="https://www.instagram.com/addictiive.gamer/" class="social-link"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://gamejolt.com/@Addictiive" class="social-link"><i class="fa-solid fa-gamepad"></i> GameJolt</a>
            <a href="https://www.bandlab.com/xatajr" class="social-link"><i class="fa-solid fa-music"></i> BandLab</a>
        </div>

        <section>
            <h2 class="es">Portafolio Artístico</h2><h2 class="en">Art Portfolio</h2>
            <div class="examples-grid">
                <div class="example-item">
                    <div class="example-img">
                        <img src="https://instagram.fvsa2-1.fna.fbcdn.net/v/t51.82787-15/654446773_17965461636042073_5471663183961094901_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=106&ig_cache_key=Mzg1NTkzNTgwNTkzNjUyOTQxNA%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjEyMDB4MTIwMC5zZHIuQzMifQ%3D%3D&_nc_ohc=j1Nw8b73aQ0Q7kNvwEkzzxs&_nc_oc=AdodW2CXEHi-qeOjSKUidshzHmh3O5IwLftgqMXYAiIz7eKKmDQTsQ4qTWT28JcIhJI&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=instagram.fvsa2-1.fna&_nc_gid=iY-51uHyBulDIe94DmcCYQ&_nc_ss=7a30f&oh=00_AfyXHJKs3qEOGxo8TsHOa11JPB7B_PdVaDR80pWFNGy1kQ&oe=69C2B142" alt="Art">
                    </div>
                </div>
                </div>
        </section>

        <footer>
            <p>Xata Jr. • 2026 • Desarrollado con Gemini AI</p>
        </footer>
    </div>

    <div id="image-viewer">
        <span class="close-viewer">&times;</span>
        <div class="viewer-content">
            <div class="img-protector"></div>
            <div id="zoom-lens"><img id="zoomed-image" src=""></div>
            <img id="full-image" src="">
        </div>
    </div>

    <script>
        function setAge() {
            const birth = new Date('2010-10-10');
            const now = new Date();
            let age = now.getFullYear() - birth.getFullYear();
            if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
            document.getElementById('age-num').innerText = age;
        }

        function selectLang(lang) {
            document.body.setAttribute('data-lang', lang);
            document.getElementById('lang-popup').style.display = 'none';
            const toggle = document.getElementById('lang-toggle');
            toggle.style.display = 'block';
            toggle.innerText = lang === 'es' ? 'ENGLISH' : 'ESPAÑOL';
        }

        function toggleLanguage() {
            const current = document.body.getAttribute('data-lang');
            selectLang(current === 'es' ? 'en' : 'es');
        }

        document.addEventListener('DOMContentLoaded', () => {
            setAge();
            const viewer = document.getElementById('image-viewer');
            const fullImg = document.getElementById('full-image');
            const zoomedImg = document.getElementById('zoomed-image');
            const lens = document.getElementById('zoom-lens');
            const protector = document.querySelector('.img-protector');

            document.querySelectorAll('.example-img img').forEach(img => {
                img.onclick = () => {
                    viewer.style.display = 'flex';
                    fullImg.src = img.src;
                    zoomedImg.src = img.src;
                }
            });

            // Lógica de Zoom en Hold
            let isHolding = false;
            const startZoom = (e) => { isHolding = true; lens.style.display = 'block'; moveZoom(e); };
            const stopZoom = () => { isHolding = false; lens.style.display = 'none'; };
            
            const moveZoom = (e) => {
                if(!isHolding) return;
                const pos = protector.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - pos.left;
                const y = (e.clientY || e.touches[0].clientY) - pos.top;
                
                lens.style.left = (e.clientX || e.touches[0].clientX) + 'px';
                lens.style.top = (e.clientY || e.touches[0].clientY) + 'px';

                const percentX = (x / pos.width) * 100;
                const percentY = (y / pos.height) * 100;
                zoomedImg.style.left = -((percentX * 2) - 50) + '%';
                zoomedImg.style.top = -((percentY * 2) - 50) + '%';
            };

            protector.onmousedown = startZoom;
            window.onmouseup = stopZoom;
            protector.onmousemove = moveZoom;
            protector.ontouchstart = startZoom;
            window.ontouchend = stopZoom;
            protector.ontouchmove = moveZoom;

            viewer.onclick = (e) => {
                if(e.target === viewer || e.target.className === 'close-viewer') {
                    viewer.style.display = 'none';
                    stopZoom();
                }
            };
        });
    </script>
</body>
</html>
